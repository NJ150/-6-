<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
<title>家計の帖</title>
<link rel="manifest" href="manifest.json" />
<meta name="theme-color" content="#2B2B28" />
<link rel="icon" href="icon-192.png" />
<link rel="apple-touch-icon" href="icon-192.png" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="家計の帖" />
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    background: #F7F4ED;
    color: #2B2B28;
    font-family: 'Hiragino Sans', 'Noto Sans JP', sans-serif;
  }
  input[type="date"]::-webkit-calendar-picker-indicator { opacity: 0.6; }
  input:focus, select:focus, button:focus-visible {
    outline: 2px solid #3A5A78;
    outline-offset: 1px;
  }
  @keyframes slideIn {
    from { opacity: 0; transform: translateY(8px); background: #EFE8D8; }
    to { opacity: 1; transform: translateY(0); }
  }
  @media (prefers-reduced-motion: reduce) {
    * { animation: none !important; transition: none !important; }
  }

  .app { min-height: 100vh; background: #F7F4ED; padding-bottom: 16px; }
  .header { border-bottom: 1px solid #D8D2C4; background: #F7F4ED; position: sticky; top: 0; z-index: 5; }
  .header-inner { max-width: 560px; margin: 0 auto; padding: 16px 18px 14px; display: flex; align-items: center; justify-content: space-between; gap: 12px; flex-wrap: wrap; }
  .brand { display: flex; align-items: center; gap: 10px; }
  .brand-mark { font-family: 'Hiragino Mincho ProN', 'Noto Serif JP', serif; font-size: 26px; width: 38px; height: 38px; display: flex; align-items: center; justify-content: center; border: 1px solid #2B2B28; border-radius: 4px; }
  .brand-title { font-family: 'Hiragino Mincho ProN', 'Noto Serif JP', serif; font-size: 18px; font-weight: 600; letter-spacing: 0.02em; }
  .brand-sub { font-size: 10px; color: #8A8378; letter-spacing: 0.05em; }
  .month-switcher { display: flex; align-items: center; gap: 4px; }
  .month-arrow { width: 28px; height: 28px; border-radius: 50%; border: 1px solid #D8D2C4; background: transparent; color: #2B2B28; font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
  .month-select { font-size: 14px; border: 1px solid #D8D2C4; border-radius: 6px; padding: 6px 8px; background: #FFFDF9; color: #2B2B28; }

  .summary-bar { max-width: 560px; margin: 18px auto 0; padding: 0 18px; display: flex; align-items: center; }
  .summary-divider { width: 1px; height: 32px; background: #D8D2C4; margin: 0 12px; }
  .sum-figure { flex: 1; min-width: 0; }
  .sum-label { font-size: 11px; color: #8A8378; margin-bottom: 2px; }
  .sum-value { font-variant-numeric: tabular-nums; font-size: 19px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  .tabs { max-width: 560px; margin: 18px auto 0; padding: 0 18px; display: flex; gap: 6px; }
  .tab-btn { flex: 1; padding: 9px 0; font-size: 13.5px; font-weight: 600; border: 1px solid #D8D2C4; background: transparent; color: #8A8378; border-radius: 7px; cursor: pointer; letter-spacing: 0.03em; }
  .tab-btn.active { background: #2B2B28; color: #F7F4ED; border-color: #2B2B28; }

  .main { max-width: 560px; margin: 0 auto; padding: 16px 18px 0; }
  .tab-pane { display: flex; flex-direction: column; gap: 14px; }
  .card { background: #FFFDF9; border: 1px solid #D8D2C4; border-radius: 10px; padding: 18px; }
  .card-title { font-family: 'Hiragino Mincho ProN', 'Noto Serif JP', serif; font-size: 15px; font-weight: 600; margin-bottom: 4px; }
  .card-hint { font-size: 12px; color: #8A8378; margin-bottom: 14px; line-height: 1.6; }

  /* ---- 残り一覧(集計タブの主役) ---- */
  .remain-hero { background: #2B2B28; color: #F7F4ED; border-radius: 10px; padding: 18px; transition: background 0.4s ease; position: relative; overflow: hidden; }
  .remain-hero-label { font-size: 12px; opacity: 0.7; margin-bottom: 4px; }
  .remain-hero-value { font-family: 'Hiragino Mincho ProN', 'Noto Serif JP', serif; font-size: 30px; font-weight: 700; font-variant-numeric: tabular-nums; position: relative; z-index: 1; }
  .remain-hero-sub { font-size: 11.5px; opacity: 0.65; margin-top: 6px; line-height: 1.6; position: relative; z-index: 1; }
  .remain-hero-badge { display: inline-block; font-size: 11px; font-weight: 700; padding: 3px 9px; border-radius: 999px; margin-bottom: 8px; position: relative; z-index: 1; }

  /* 赤字確定:予算合計が集計対象収入を超えている */
  .remain-hero.deficit { background: #6B2A22; }
  .remain-hero.deficit .remain-hero-value { color: #FFD7CC; }
  .remain-hero.deficit .remain-hero-badge { background: #C0533C; color: #FFF6F0; }

  /* 黒字・5万円以上:少し明るい祝福 */
  .remain-hero.surplus-mid { background: linear-gradient(135deg, #2F5C45, #3A5A78); }
  .remain-hero.surplus-mid .remain-hero-badge { background: #7FB89A; color: #1F3A2C; }

  /* 黒字・10万円以上:カラフルなお祝い */
  .remain-hero.surplus-high {
    background: linear-gradient(120deg, #3A5A78, #4F8A63, #C98A3A, #3A5A78);
    background-size: 300% 300%;
    animation: heroCelebrate 6s ease infinite;
  }
  .remain-hero.surplus-high .remain-hero-badge { background: #FFD76A; color: #4A3300; }
  @keyframes heroCelebrate {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
  }
  .remain-hero.surplus-high::after {
    content: "🎉";
    position: absolute;
    right: 14px;
    top: 12px;
    font-size: 22px;
    opacity: 0.9;
  }

  .remain-list { display: flex; flex-direction: column; gap: 12px; }
  .remain-row { border: 1px solid #D8D2C4; border-radius: 9px; padding: 13px 14px; background: #FFFDF9; }
  .remain-row.danger { border-color: #C0533C; background: #C0533C0A; }
  .remain-row-top { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 6px; }
  .remain-cat-name { font-size: 13.5px; font-weight: 600; display: flex; align-items: center; gap: 6px; }
  .remain-amount { font-size: 18px; font-weight: 700; font-variant-numeric: tabular-nums; }
  .remain-amount.danger { color: #C0533C; }
  .remain-amount.ok { color: #3A5A78; }
  .remain-detail { font-size: 11px; color: #8A8378; display: flex; justify-content: space-between; font-variant-numeric: tabular-nums; }
  .remain-no-budget { font-size: 11.5px; color: #B5AE9D; }

  .type-toggle { display: flex; gap: 8px; margin-bottom: 14px; }
  .type-btn { flex: 1; padding: 10px 0; font-weight: 700; font-size: 14px; border: 1px solid #D8D2C4; border-radius: 7px; background: transparent; color: #8A8378; cursor: pointer; }
  .type-btn.expense-active { background: #C0533C14; border-color: #C0533C; color: #C0533C; }
  .type-btn.income-active { background: #3A5A7814; border-color: #3A5A78; color: #3A5A78; }

  .category-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; margin-bottom: 16px; }
  .cat-chip { padding: 9px 10px; font-size: 13px; border: 1px solid #D8D2C4; border-radius: 7px; background: transparent; color: #5A5650; cursor: pointer; text-align: left; }

  .income-select { width: 100%; border: 1px solid #D8D2C4; border-radius: 7px; padding: 9px 10px; font-size: 14px; background: #FFFDF9; color: #2B2B28; font-family: inherit; margin-bottom: 14px; }

  .field-row { margin-bottom: 12px; }
  .field-label { display: block; font-size: 12px; color: #8A8378; margin-bottom: 5px; }
  .amount-input-wrap { display: flex; align-items: center; border: 1px solid #D8D2C4; border-radius: 7px; padding: 6px 12px; background: #FFFDF9; }
  .yen-mark { font-size: 18px; color: #8A8378; margin-right: 6px; }
  .amount-input { flex: 1; border: none; outline: none; background: transparent; font-size: 22px; font-variant-numeric: tabular-nums; font-weight: 700; color: #2B2B28; min-width: 0; font-family: inherit; }
  .date-input, .memo-input { width: 100%; border: 1px solid #D8D2C4; border-radius: 7px; padding: 9px 10px; font-size: 14px; background: #FFFDF9; color: #2B2B28; font-family: inherit; }

  .error-text { color: #C0533C; font-size: 12.5px; margin-bottom: 10px; }
  .add-btn { width: 100%; padding: 12px 0; background: #2B2B28; color: #F7F4ED; border: none; border-radius: 7px; font-family: 'Hiragino Mincho ProN', 'Noto Serif JP', serif; font-size: 15px; font-weight: 600; letter-spacing: 0.05em; cursor: pointer; }

  .ledger-card { background: #FFFDF9; border: 1px solid #D8D2C4; border-radius: 10px; overflow: hidden; }
  .ledger-header { font-family: 'Hiragino Mincho ProN', 'Noto Serif JP', serif; font-size: 14px; font-weight: 600; padding: 14px 18px 10px; border-bottom: 1px solid #ECE6D8; }
  .empty-state { padding: 24px 18px; font-size: 13px; color: #8A8378; line-height: 1.7; }
  .ledger-list { display: flex; flex-direction: column; }
  .ledger-row { display: flex; align-items: center; padding: 12px 18px; border-bottom: 1px solid #ECE6D8; gap: 10px; }
  .ledger-row.new { animation: slideIn 0.5s ease-out; }
  .ledger-icon { font-size: 18px; width: 26px; text-align: center; flex-shrink: 0; }
  .ledger-mid { flex: 1; min-width: 0; }
  .ledger-cat { font-size: 13.5px; font-weight: 600; }
  .ledger-memo { font-size: 11.5px; color: #8A8378; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .ledger-amount { font-size: 14.5px; font-weight: 700; font-variant-numeric: tabular-nums; white-space: nowrap; }
  .delete-btn { border: none; background: transparent; color: #C4BFAF; font-size: 18px; cursor: pointer; width: 22px; flex-shrink: 0; }

  .bar-track { height: 8px; background: #ECE6D8; border-radius: 4px; overflow: hidden; margin-top: 8px; }
  .bar-fill { height: 100%; border-radius: 4px; transition: width 0.4s ease; }

  .total-card { background: #2B2B28; color: #F7F4ED; border-radius: 10px; padding: 16px 18px; display: flex; justify-content: space-between; align-items: center; }
  .total-label { font-size: 13px; opacity: 0.75; }
  .total-value { font-size: 20px; font-weight: 700; font-variant-numeric: tabular-nums; }

  /* ---- 収入編集(予算タブ内) ---- */
  .income-edit-row { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
  .income-name-input { flex: 1.3; min-width: 0; border: 1px solid #D8D2C4; border-radius: 6px; padding: 7px 9px; font-size: 12.5px; background: #FFFDF9; color: #2B2B28; font-family: inherit; }
  .income-budget-input { flex: 1; min-width: 0; border: 1px solid #D8D2C4; border-radius: 6px; padding: 7px 9px; font-size: 12.5px; text-align: right; background: #FFFDF9; color: #2B2B28; font-family: inherit; font-variant-numeric: tabular-nums; }
  .income-include-toggle { flex-shrink: 0; width: 64px; padding: 7px 0; font-size: 11px; border: 1px solid #D8D2C4; border-radius: 6px; background: transparent; color: #8A8378; cursor: pointer; text-align: center; }
  .income-include-toggle.on { background: #3A5A7814; border-color: #3A5A78; color: #3A5A78; }

  .budget-list { display: flex; flex-direction: column; gap: 16px; }
  .budget-row-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
  .budget-cat-label { font-size: 13.5px; font-weight: 600; }
  .budget-input-wrap { display: flex; align-items: center; border: 1px solid #D8D2C4; border-radius: 6px; padding: 3px 8px; }
  .yen-mark-small { font-size: 12px; color: #8A8378; margin-right: 3px; }
  .budget-input { width: 80px; border: none; outline: none; text-align: right; font-size: 13px; font-variant-numeric: tabular-nums; color: #2B2B28; font-family: inherit; }
  .budget-status { font-size: 11.5px; margin-top: 4px; }

  .section-divider { height: 1px; background: #ECE6D8; margin: 18px 0; }

  .backup-btn-row { display: flex; gap: 8px; }
  .backup-btn { flex: 1; padding: 11px 0; font-size: 13px; font-weight: 600; border-radius: 7px; cursor: pointer; text-align: center; }
  .backup-btn.export { background: #2B2B28; color: #F7F4ED; border: none; }
  .backup-btn.import { background: transparent; color: #2B2B28; border: 1px solid #D8D2C4; }
  .backup-msg { font-size: 11.5px; margin-top: 10px; line-height: 1.6; }
  .backup-msg.success { color: #3A5A78; }
  .backup-msg.error { color: #C0533C; }
  .backup-file-input { display: none; }

  .footer { text-align: center; font-size: 11px; color: #B5AE9D; padding: 24px 0 8px; }
</style>
</head>
<body>
<div id="root"></div>

<script>
"use strict";

/* ----------------------------------------------------------
   家計の帖 — 完全オフライン動作版
   収入を複数項目で管理し、支出カテゴリごとに予算 − 使用額 = 残額 を主役にする
---------------------------------------------------------- */

const DEFAULT_INCOME_SOURCES = [
  { id: "inc1", name: "給料", includeInTotal: true },
  { id: "inc2", name: "ボーナス", includeInTotal: true },
  { id: "inc3", name: "副業", includeInTotal: true },
  { id: "inc4", name: "その他収入", includeInTotal: true },
  { id: "inc5", name: "貯蓄口座へ移す分", includeInTotal: false },
];

const DEFAULT_EXPENSE_CATEGORIES = [
  { id: "food", label: "食費(日用品・サウナなど)", icon: "🍚", color: "#C0533C" },
  { id: "housing", label: "住居費", icon: "🏠", color: "#6B5A7A" },
  { id: "credit", label: "クレジットカード", icon: "💳", color: "#9C8254" },
  { id: "insurance", label: "保険・iDeCo・税理士代", icon: "🛡️", color: "#5A8B8B" },
  { id: "social", label: "交際費", icon: "🍶", color: "#B8895A" },
  { id: "other", label: "その他", icon: "📎", color: "#8A8378" },
  { id: "savings", label: "貯蓄分", icon: "🏦", color: "#3A5A78" },
];

const STORAGE_KEY_ENTRIES = "kakeibo_entries_v2";
const STORAGE_KEY_BUDGETS = "kakeibo_budgets_v2";
const STORAGE_KEY_INCOME_SOURCES = "kakeibo_income_sources_v2";
const STORAGE_KEY_INCOME_AMOUNTS = "kakeibo_income_amounts_v2"; // { "2026-06": { inc1: 300000, ... } }

function ym(date) {
  return date.getFullYear() + "-" + String(date.getMonth() + 1).padStart(2, "0");
}
function todayStr() {
  const d = new Date();
  return d.getFullYear() + "-" + String(d.getMonth() + 1).padStart(2, "0") + "-" + String(d.getDate()).padStart(2, "0");
}
function fmtYen(n) {
  const sign = n < 0 ? "-" : "";
  return sign + "¥" + Math.abs(Math.round(n)).toLocaleString("ja-JP");
}
function monthLabel(key) {
  const parts = key.split("-");
  return parts[0] + "年" + parseInt(parts[1], 10) + "月";
}
function loadJSON(key, fallback) {
  try {
    const raw = localStorage.getItem(key);
    if (!raw) return fallback;
    return JSON.parse(raw);
  } catch (e) { return fallback; }
}
function saveJSON(key, value) {
  try { localStorage.setItem(key, JSON.stringify(value)); } catch (e) {}
}
function el(tag, attrs, children) {
  const node = document.createElement(tag);
  if (attrs) {
    for (const k in attrs) {
      if (k === "class") node.className = attrs[k];
      else if (k === "text") node.textContent = attrs[k];
      else if (k.startsWith("on") && typeof attrs[k] === "function") {
        node.addEventListener(k.slice(2).toLowerCase(), attrs[k]);
      } else if (k === "html") {
        node.innerHTML = attrs[k];
      } else {
        node.setAttribute(k, attrs[k]);
      }
    }
  }
  (children || []).forEach((c) => {
    if (c === null || c === undefined) return;
    if (typeof c === "string") node.appendChild(document.createTextNode(c));
    else node.appendChild(c);
  });
  return node;
}

/* ---------------- State ---------------- */

let state = {
  entries: loadJSON(STORAGE_KEY_ENTRIES, []),                         // 支出記録のみ([{id,category,amount,memo,date}])
  budgets: loadJSON(STORAGE_KEY_BUDGETS, {}),                          // { categoryId: amount }
  incomeSources: loadJSON(STORAGE_KEY_INCOME_SOURCES, DEFAULT_INCOME_SOURCES.map((s) => Object.assign({}, s))),
  incomeAmounts: loadJSON(STORAGE_KEY_INCOME_AMOUNTS, {}),             // { "2026-06": { inc1: 300000 } }
  currentMonth: ym(new Date()),
  tab: "remain", // remain(残り一覧) | record | budget
  form: { category: "food", amount: "", memo: "", date: todayStr() },
  error: "",
  justAddedId: null,
};

function persist() {
  saveJSON(STORAGE_KEY_ENTRIES, state.entries);
  saveJSON(STORAGE_KEY_BUDGETS, state.budgets);
  saveJSON(STORAGE_KEY_INCOME_SOURCES, state.incomeSources);
  saveJSON(STORAGE_KEY_INCOME_AMOUNTS, state.incomeAmounts);
}

function getMonthEntries() {
  return state.entries.filter((e) => e.date.slice(0, 7) === state.currentMonth);
}
function getMonths() {
  const set = new Set(state.entries.map((e) => e.date.slice(0, 7)));
  set.add(state.currentMonth);
  return Array.from(set).sort().reverse();
}
function getCategoryTotals(monthEntries) {
  const t = {};
  DEFAULT_EXPENSE_CATEGORIES.forEach((c) => (t[c.id] = 0));
  monthEntries.forEach((e) => {
    t[e.category] = (t[e.category] || 0) + e.amount;
  });
  return t;
}
function getMonthIncomeAmounts() {
  return state.incomeAmounts[state.currentMonth] || {};
}
function getTotalIncome(includedOnly) {
  const amounts = getMonthIncomeAmounts();
  return state.incomeSources.reduce((sum, src) => {
    if (includedOnly && !src.includeInTotal) return sum;
    return sum + (amounts[src.id] || 0);
  }, 0);
}

/* ---------------- Actions ---------------- */

function addEntry() {
  const amt = parseFloat(state.form.amount);
  if (!state.form.amount || isNaN(amt) || amt <= 0) {
    state.error = "金額を入力してください";
    render();
    return;
  }
  if (!state.form.date) {
    state.error = "日付を入力してください";
    render();
    return;
  }
  state.error = "";
  const entry = {
    id: Date.now() + "-" + Math.random().toString(36).slice(2, 7),
    category: state.form.category,
    amount: amt,
    memo: state.form.memo.trim(),
    date: state.form.date,
  };
  state.entries = [entry, ...state.entries];
  state.currentMonth = entry.date.slice(0, 7);
  state.form.amount = "";
  state.form.memo = "";
  state.justAddedId = entry.id;
  persist();
  render();
  setTimeout(() => { state.justAddedId = null; render(); }, 900);
}

function deleteEntry(id) {
  state.entries = state.entries.filter((e) => e.id !== id);
  persist();
  render();
}

function setBudgetSilent(catId, value) {
  if (value === undefined) delete state.budgets[catId];
  else state.budgets[catId] = value;
  persist();
}

function setIncomeAmountSilent(srcId, value) {
  if (!state.incomeAmounts[state.currentMonth]) state.incomeAmounts[state.currentMonth] = {};
  if (value === undefined) delete state.incomeAmounts[state.currentMonth][srcId];
  else state.incomeAmounts[state.currentMonth][srcId] = value;
  persist();
}

function setIncomeSourceNameSilent(srcId, name) {
  const src = state.incomeSources.find((s) => s.id === srcId);
  if (src) src.name = name;
  persist();
}

function toggleIncomeInclude(srcId) {
  const src = state.incomeSources.find((s) => s.id === srcId);
  if (src) src.includeInTotal = !src.includeInTotal;
  persist();
  render();
}

function shiftMonth(delta) {
  const parts = state.currentMonth.split("-").map(Number);
  const d = new Date(parts[0], parts[1] - 1 + delta, 1);
  state.currentMonth = ym(d);
  render();
}

/* ---------------- Backup: Export / Import ---------------- */

function exportData() {
  const payload = {
    appName: "kakeibo",
    exportedAt: new Date().toISOString(),
    version: 2,
    entries: state.entries,
    budgets: state.budgets,
    incomeSources: state.incomeSources,
    incomeAmounts: state.incomeAmounts,
  };
  const json = JSON.stringify(payload, null, 2);
  const blob = new Blob([json], { type: "application/json" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  const today = todayStr();
  a.href = url;
  a.download = "kakeibo-backup-" + today + ".json";
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  setTimeout(() => URL.revokeObjectURL(url), 1000);
}

function importDataFromFile(file, onResult) {
  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      const data = JSON.parse(e.target.result);
      if (!data || typeof data !== "object") throw new Error("形式が正しくありません");
      if (!Array.isArray(data.entries)) throw new Error("entriesが見つかりません");

      state.entries = data.entries || [];
      state.budgets = data.budgets || {};
      state.incomeSources = Array.isArray(data.incomeSources) && data.incomeSources.length > 0
        ? data.incomeSources
        : DEFAULT_INCOME_SOURCES.map((s) => Object.assign({}, s));
      state.incomeAmounts = data.incomeAmounts || {};
      persist();
      onResult({ ok: true, count: state.entries.length });
      render();
    } catch (err) {
      onResult({ ok: false, message: err.message });
    }
  };
  reader.onerror = () => onResult({ ok: false, message: "ファイルの読み込みに失敗しました" });
  reader.readAsText(file);
}

/* ---------------- Render: Header ---------------- */

function renderHeader() {
  const months = getMonths();
  const select = el("select", { class: "month-select", onChange: (e) => { state.currentMonth = e.target.value; render(); } });
  if (months.indexOf(state.currentMonth) === -1) {
    select.appendChild(el("option", { value: state.currentMonth, text: monthLabel(state.currentMonth) }));
  }
  months.forEach((m) => {
    const opt = el("option", { value: m, text: monthLabel(m) });
    if (m === state.currentMonth) opt.selected = true;
    select.appendChild(opt);
  });

  return el("header", { class: "header" }, [
    el("div", { class: "header-inner" }, [
      el("div", { class: "brand" }, [
        el("span", { class: "brand-mark", text: "帳" }),
        el("div", null, [
          el("div", { class: "brand-title", text: "家計の帖" }),
          el("div", { class: "brand-sub", text: "かけいのちょう" }),
        ]),
      ]),
      el("div", { class: "month-switcher" }, [
        el("button", { class: "month-arrow", "aria-label": "前の月", onClick: () => shiftMonth(-1), text: "‹" }),
        select,
        el("button", { class: "month-arrow", "aria-label": "次の月", onClick: () => shiftMonth(1), text: "›" }),
      ]),
    ]),
  ]);
}

/* ---------------- Render: Summary bar ---------------- */

function renderSummaryBar(monthEntries) {
  const income = getTotalIncome(true);
  const expense = monthEntries.reduce((s, e) => s + e.amount, 0);
  const balance = income - expense;

  function figure(label, value, color) {
    return el("div", { class: "sum-figure" }, [
      el("div", { class: "sum-label", text: label }),
      el("div", { class: "sum-value", style: "color:" + color, text: fmtYen(value) }),
    ]);
  }

  return el("div", { class: "summary-bar" }, [
    figure("収入(集計対象)", income, "#3A5A78"),
    el("div", { class: "summary-divider" }),
    figure("使った額", expense, "#C0533C"),
    el("div", { class: "summary-divider" }),
    figure("残り", balance, "#2B2B28"),
  ]);
}

/* ---------------- Render: Tabs ---------------- */

function renderTabs() {
  const tabs = [["remain", "残り一覧"], ["record", "記録"], ["budget", "予算・収入"]];
  return el("nav", { class: "tabs" }, tabs.map(([key, label]) =>
    el("button", {
      class: "tab-btn" + (state.tab === key ? " active" : ""),
      onClick: () => { state.tab = key; render(); },
      text: label,
    })
  ));
}

/* ---------------- Render: 残り一覧タブ(主役) ---------------- */

function renderRemainTab(monthEntries) {
  const totals = getCategoryTotals(monthEntries);
  const totalIncome = getTotalIncome(true);
  const totalBudgeted = DEFAULT_EXPENSE_CATEGORIES.reduce((s, c) => s + (state.budgets[c.id] || 0), 0);
  const totalSpent = monthEntries.reduce((s, e) => s + e.amount, 0);
  const totalRemain = totalBudgeted > 0 ? totalBudgeted - totalSpent : totalIncome - totalSpent;

  // 赤字確定:予算を組んだ時点で、予算合計が集計対象の収入を超えている
  const budgetExceedsIncome = totalBudgeted > 0 && totalIncome > 0 && totalBudgeted > totalIncome;
  const budgetOverIncomeAmount = totalBudgeted - totalIncome;

  let heroClass = "remain-hero";
  let badge = null;
  if (budgetExceedsIncome) {
    heroClass += " deficit";
    badge = "赤字経営が確定しています(予算が収入を " + fmtYen(budgetOverIncomeAmount) + " 超過)";
  } else if (totalRemain >= 100000) {
    heroClass += " surplus-high";
    badge = "かなりの黒字ペースです";
  } else if (totalRemain >= 50000) {
    heroClass += " surplus-mid";
    badge = "順調な黒字ペースです";
  }

  const heroChildren = [];
  if (badge) heroChildren.push(el("div", { class: "remain-hero-badge", text: badge }));
  heroChildren.push(el("div", { class: "remain-hero-label", text: monthLabel(state.currentMonth) + "・全体の残り" }));
  heroChildren.push(el("div", { class: "remain-hero-value", text: fmtYen(totalRemain) }));
  heroChildren.push(el("div", { class: "remain-hero-sub", text: totalBudgeted > 0
    ? ("予算合計 " + fmtYen(totalBudgeted) + " − 使った額 " + fmtYen(totalSpent))
    : ("収入(集計対象) " + fmtYen(totalIncome) + " − 使った額 " + fmtYen(totalSpent) + "  ※カテゴリ予算を設定すると、より正確な残りが出ます") }));

  const hero = el("div", { class: heroClass }, heroChildren);

  const list = el("div", { class: "remain-list" });
  DEFAULT_EXPENSE_CATEGORIES.forEach((c) => {
    const spent = totals[c.id] || 0;
    const budget = state.budgets[c.id];
    const hasBudget = budget !== undefined && budget > 0;
    const remain = hasBudget ? budget - spent : null;
    const danger = hasBudget && remain < 0;

    const row = el("div", { class: "remain-row" + (danger ? " danger" : "") });
    const top = el("div", { class: "remain-row-top" }, [
      el("div", { class: "remain-cat-name" }, [
        el("span", { text: c.icon }),
        el("span", { text: c.label }),
      ]),
      hasBudget
        ? el("div", { class: "remain-amount " + (danger ? "danger" : "ok"), text: fmtYen(remain) })
        : el("div", { class: "remain-no-budget", text: "予算未設定" }),
    ]);
    row.appendChild(top);

    if (hasBudget) {
      const pct = Math.min(100, (spent / budget) * 100);
      row.appendChild(el("div", { class: "bar-track" }, [
        el("div", { class: "bar-fill", style: "width:" + pct + "%;background:" + (danger ? "#C0533C" : c.color) }),
      ]));
      row.appendChild(el("div", { class: "remain-detail" }, [
        el("span", { text: "使った: " + fmtYen(spent) }),
        el("span", { text: "予算: " + fmtYen(budget) }),
      ]));
      if (danger) {
        row.appendChild(el("div", { style: "color:#C0533C;font-size:11.5px;margin-top:4px;", text: "予算を " + fmtYen(Math.abs(remain)) + " 超えています" }));
      }
    } else {
      row.appendChild(el("div", { class: "remain-detail", style: "margin-top:6px;" }, [
        el("span", { text: "使った: " + fmtYen(spent) }),
      ]));
    }

    list.appendChild(row);
  });

  const hint = el("div", { class: "card-hint", style: "margin-top:-4px;", text: "「予算・収入」タブで各カテゴリの予算を設定すると、ここに残り使える額が表示されます。" });

  return el("div", { class: "tab-pane" }, [hero, list, hint]);
}

/* ---------------- Render: Record tab ---------------- */

function renderRecordTab(monthEntries) {
  const card = el("div", { class: "card" });
  card.appendChild(el("div", { class: "card-title", text: "支出を記録する" }));
  card.appendChild(el("div", { style: "height:10px" }));

  const grid = el("div", { class: "category-grid" });
  DEFAULT_EXPENSE_CATEGORIES.forEach((c) => {
    const active = state.form.category === c.id;
    const btn = el("button", {
      class: "cat-chip",
      onClick: () => { state.form.category = c.id; render(); },
    }, [el("span", { style: "margin-right:6px", text: c.icon }), document.createTextNode(c.label)]);
    if (active) {
      btn.style.borderColor = c.color;
      btn.style.background = c.color + "14";
      btn.style.color = "#2B2B28";
    }
    grid.appendChild(btn);
  });
  card.appendChild(grid);

  const amountInput = el("input", {
    type: "number", inputmode: "numeric", placeholder: "0",
    class: "amount-input", value: state.form.amount,
    onInput: (e) => { state.form.amount = e.target.value; state.error = ""; },
  });
  card.appendChild(el("div", { class: "field-row" }, [
    el("label", { class: "field-label", text: "金額" }),
    el("div", { class: "amount-input-wrap" }, [
      el("span", { class: "yen-mark", text: "¥" }),
      amountInput,
    ]),
  ]));

  const dateInput = el("input", {
    type: "date", class: "date-input", value: state.form.date,
    onInput: (e) => { state.form.date = e.target.value; },
  });
  card.appendChild(el("div", { class: "field-row" }, [
    el("label", { class: "field-label", text: "日付" }),
    dateInput,
  ]));

  const memoInput = el("input", {
    type: "text", placeholder: "任意", class: "memo-input", value: state.form.memo,
    onInput: (e) => { state.form.memo = e.target.value; },
  });
  card.appendChild(el("div", { class: "field-row" }, [
    el("label", { class: "field-label", text: "メモ" }),
    memoInput,
  ]));

  if (state.error) {
    card.appendChild(el("div", { class: "error-text", text: state.error }));
  }

  card.appendChild(el("button", { class: "add-btn", text: "帖に記す", onClick: addEntry }));

  const ledgerCard = el("div", { class: "ledger-card" });
  ledgerCard.appendChild(el("div", { class: "ledger-header", text: "この月の記録" }));

  const sorted = monthEntries.slice().sort((a, b) => (a.date < b.date ? 1 : -1));
  if (sorted.length === 0) {
    ledgerCard.appendChild(el("div", { class: "empty-state", text: "まだ記録がありません。上のフォームから書き入れてみましょう。" }));
  } else {
    const list = el("div", { class: "ledger-list" });
    sorted.forEach((e) => {
      const cat = DEFAULT_EXPENSE_CATEGORIES.find((c) => c.id === e.category) || DEFAULT_EXPENSE_CATEGORIES[DEFAULT_EXPENSE_CATEGORIES.length - 1];
      const row = el("div", { class: "ledger-row" + (state.justAddedId === e.id ? " new" : "") }, [
        el("span", { class: "ledger-icon", text: cat.icon }),
        el("div", { class: "ledger-mid" }, [
          el("div", { class: "ledger-cat", text: cat.label }),
          el("div", { class: "ledger-memo", text: e.date.slice(5).replace("-", "/") + " " + e.memo }),
        ]),
        el("div", { class: "ledger-amount", style: "color:#C0533C", text: "−" + fmtYen(e.amount) }),
        el("button", { class: "delete-btn", "aria-label": "削除", text: "×", onClick: () => deleteEntry(e.id) }),
      ]);
      list.appendChild(row);
    });
    ledgerCard.appendChild(list);
  }

  return el("div", { class: "tab-pane" }, [card, ledgerCard]);
}

/* ---------------- Render: 予算・収入タブ ---------------- */

function renderBudgetTab(monthEntries) {
  const totals = getCategoryTotals(monthEntries);
  const monthIncomeAmounts = getMonthIncomeAmounts();

  // --- 収入セクション ---
  const incomeCard = el("div", { class: "card" });
  incomeCard.appendChild(el("div", { class: "card-title", text: "今月の収入" }));
  incomeCard.appendChild(el("div", { class: "card-hint", text: "項目名は自由に変更できます。「集計」をオフにすると、その収入は上部の合計や残額計算に含まれません(貯蓄口座へ移す分などに便利です)。" }));

  state.incomeSources.forEach((src) => {
    const nameInput = el("input", {
      type: "text", class: "income-name-input", value: src.name,
      onInput: (e) => { setIncomeSourceNameSilent(src.id, e.target.value); },
    });
    const amountInput = el("input", {
      type: "number", inputmode: "numeric", placeholder: "0", class: "income-budget-input",
      value: monthIncomeAmounts[src.id] || "",
      onInput: (e) => {
        const v = e.target.value ? parseFloat(e.target.value) : undefined;
        setIncomeAmountSilent(src.id, v);
        updateSummaryBarAndHeroOnly();
      },
    });
    const toggleBtn = el("button", {
      class: "income-include-toggle" + (src.includeInTotal ? " on" : ""),
      text: src.includeInTotal ? "集計対象" : "対象外",
      onClick: () => toggleIncomeInclude(src.id),
    });
    incomeCard.appendChild(el("div", { class: "income-edit-row" }, [nameInput, amountInput, toggleBtn]));
  });

  const totalIncomeAll = state.incomeSources.reduce((s, src) => s + (monthIncomeAmounts[src.id] || 0), 0);
  const totalIncomeCounted = getTotalIncome(true);
  incomeCard.appendChild(el("div", { class: "section-divider" }));
  incomeCard.appendChild(el("div", { class: "remain-detail", style: "font-size:12.5px;" }, [
    el("span", { text: "収入合計(すべて)" }),
    el("span", { text: fmtYen(totalIncomeAll) }),
  ]));
  incomeCard.appendChild(el("div", { class: "remain-detail", style: "font-size:12.5px;margin-top:4px;color:#3A5A78;font-weight:700;" }, [
    el("span", { text: "うち集計対象" }),
    el("span", { text: fmtYen(totalIncomeCounted) }),
  ]));

  // --- カテゴリ別予算セクション ---
  const budgetCard = el("div", { class: "card" });
  budgetCard.appendChild(el("div", { class: "card-title", text: "カテゴリ別予算" }));
  budgetCard.appendChild(el("div", { class: "card-hint", text: "各カテゴリの今月の予算上限を設定すると、「残り一覧」タブでどれだけ使えるか確認できます。" }));

  const list = el("div", { class: "budget-list" });
  DEFAULT_EXPENSE_CATEGORIES.forEach((c) => {
    const spent = totals[c.id] || 0;
    const budget = state.budgets[c.id] || 0;
    const pct = budget ? Math.min(100, (spent / budget) * 100) : 0;
    const over = budget && spent > budget;

    const input = el("input", {
      type: "number", inputmode: "numeric", placeholder: "未設定", class: "budget-input",
      value: state.budgets[c.id] || "",
    });

    const head = el("div", { class: "budget-row-head" }, [
      el("span", { class: "budget-cat-label", text: c.icon + " " + c.label }),
      el("div", { class: "budget-input-wrap" }, [
        el("span", { class: "yen-mark-small", text: "¥" }),
        input,
      ]),
    ]);

    const barWrap = el("div", { class: "bar-track" }, [
      el("div", { class: "bar-fill", style: "width:" + pct + "%;background:" + (over ? "#C0533C" : c.color) }),
    ]);
    const statusWrap = el("div", { class: "budget-status", style: "color:" + (over ? "#C0533C" : "#8A8378"), text: fmtYen(spent) + " / " + fmtYen(budget) + (over ? "  ・ 予算を超えています" : "") });
    barWrap.style.display = budget > 0 ? "" : "none";
    statusWrap.style.display = budget > 0 ? "" : "none";

    input.addEventListener("input", (e) => {
      const v = e.target.value ? parseFloat(e.target.value) : undefined;
      setBudgetSilent(c.id, v);
      const newBudget = v || 0;
      const newPct = newBudget ? Math.min(100, (spent / newBudget) * 100) : 0;
      const newOver = newBudget && spent > newBudget;
      if (newBudget > 0) {
        barWrap.style.display = "";
        statusWrap.style.display = "";
        barWrap.firstChild.style.width = newPct + "%";
        barWrap.firstChild.style.background = newOver ? "#C0533C" : c.color;
        statusWrap.style.color = newOver ? "#C0533C" : "#8A8378";
        statusWrap.textContent = fmtYen(spent) + " / " + fmtYen(newBudget) + (newOver ? "  ・ 予算を超えています" : "");
      } else {
        barWrap.style.display = "none";
        statusWrap.style.display = "none";
      }
    });

    list.appendChild(el("div", { class: "budget-row" }, [head, barWrap, statusWrap]));
  });
  budgetCard.appendChild(list);

  // --- バックアップセクション ---
  const backupCard = el("div", { class: "card" });
  backupCard.appendChild(el("div", { class: "card-title", text: "データのバックアップ" }));
  backupCard.appendChild(el("div", { class: "card-hint", text: "記録はこの端末のブラウザ内に保存されています。ブラウザの履歴やサイトデータを削除すると消えてしまうため、ときどきファイルに書き出して保管しておくと安心です。" }));

  const fileInput = el("input", { type: "file", accept: "application/json,.json", class: "backup-file-input" });
  const msgArea = el("div", { class: "backup-msg" });

  const exportBtn = el("button", {
    class: "backup-btn export",
    text: "ファイルに書き出す",
    onClick: () => {
      exportData();
      msgArea.className = "backup-msg success";
      msgArea.textContent = "バックアップファイルをダウンロードしました。";
    },
  });
  const importBtn = el("button", {
    class: "backup-btn import",
    text: "ファイルから読み込む",
    onClick: () => fileInput.click(),
  });

  fileInput.addEventListener("change", (e) => {
    const file = e.target.files && e.target.files[0];
    if (!file) return;
    const proceed = window.confirm("読み込むと現在の記録は上書きされます。よろしいですか?");
    if (!proceed) { fileInput.value = ""; return; }
    importDataFromFile(file, (result) => {
      if (result.ok) {
        msgArea.className = "backup-msg success";
        msgArea.textContent = "読み込みが完了しました(" + result.count + "件の記録)。";
      } else {
        msgArea.className = "backup-msg error";
        msgArea.textContent = "読み込みに失敗しました: " + result.message;
      }
      fileInput.value = "";
    });
  });

  backupCard.appendChild(el("div", { class: "backup-btn-row" }, [exportBtn, importBtn]));
  backupCard.appendChild(fileInput);
  backupCard.appendChild(msgArea);

  return el("div", { class: "tab-pane" }, [incomeCard, budgetCard, backupCard]);
}

/* 収入入力時、全体を再描画せずサマリーバーだけ即時更新(フォーカス維持) */
function updateSummaryBarAndHeroOnly() {
  const bar = document.querySelector(".summary-bar");
  if (bar) {
    const monthEntries = getMonthEntries();
    const newBar = renderSummaryBar(monthEntries);
    bar.replaceWith(newBar);
  }
}

/* ---------------- Main render ---------------- */
/* テキスト入力(input)では基本的に render() を呼ばない。
   入力欄の値は state に保存し、必要な箇所だけ直接DOM更新することで
   入力中にフォーカスが外れたりキーボードが閉じたりしないようにする。 */

function render() {
  const root = document.getElementById("root");
  const monthEntries = getMonthEntries();

  root.innerHTML = "";
  const app = el("div", { class: "app" });
  app.appendChild(renderHeader());
  app.appendChild(renderSummaryBar(monthEntries));
  app.appendChild(renderTabs());

  let paneContent;
  if (state.tab === "remain") paneContent = renderRemainTab(monthEntries);
  else if (state.tab === "record") paneContent = renderRecordTab(monthEntries);
  else paneContent = renderBudgetTab(monthEntries);

  const main = el("div", { class: "main" }, [paneContent]);
  app.appendChild(main);
  app.appendChild(el("div", { class: "footer", text: "データはこの端末のブラウザ内に保存されます" }));

  root.appendChild(app);
}

render();

if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("sw.js").catch(() => {});
  });
}
</script>
</body>
</html>
